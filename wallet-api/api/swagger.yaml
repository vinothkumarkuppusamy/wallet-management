openapi: 3.0.0
info:
  title: Wallet API
  version: 1.0.0
  description: Wallet system with Auth, KYC, and Transactions

servers:
  - url: http://localhost:5000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        mobile:
          type: string
        name:
          type: string
        is_verified:
          type: boolean

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    WalletTransaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [credit, debit]
        amount:
          type: number
        created_at:
          type: string
          format: date-time

    KYC:
      type: object
      properties:
        user_id:
          type: integer
        document_url:
          type: string
        status:
          type: string
          enum: [PENDING, VERIFIED, REJECTED]

paths:

  /api/auth/send-otp:
    post:
      summary: Send OTP
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mobile]
              properties:
                mobile:
                  type: string
      responses:
        '200':
          description: OTP sent

  /api/auth/verify-otp:
    post:
      summary: Verify OTP and login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mobile, otp]
              properties:
                mobile:
                  type: string
                otp:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/auth/logout:
    post:
      summary: Logout user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out

  /api/users/register:
    post:
      summary: Register user
      tags: [User]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mobile, name]
              properties:
                mobile:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: User registered

  /api/wallet/add:
    post:
      summary: Add money to wallet
      tags: [Wallet]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
      responses:
        '200':
          description: Money added

  /api/wallet/withdraw:
    post:
      summary: Withdraw money
      tags: [Wallet]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
      responses:
        '200':
          description: Money withdrawn

  /api/wallet/passbook:
    get:
      summary: Get transaction history
      tags: [Wallet]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Passbook data
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/WalletTransaction'

  /api/kyc/upload:
    post:
      summary: Upload KYC document
      tags: [KYC]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document:
                  type: string
                  format: binary
      responses:
        '200':
          description: KYC uploaded

  /api/kyc/status:
    get:
      summary: Get KYC status
      tags: [KYC]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: KYC status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KYC'